run:
  timeout: 5m
  tests: true

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - structcheck
    - varcheck
    - ineffassign
    - deadcode
    - typecheck
    - gofmt
    - goimports
    - misspell
    - unconvert
    - nakedret
    - copyloopvar

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/devathh/xcoder

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
